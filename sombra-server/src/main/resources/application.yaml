spring:
  application:
    name: sombra
  threads:
    virtual:
      enabled: true
  main:
    banner-mode: off
  docker:
    compose:
      enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      auto-offset-reset: earliest
      group-id: sombra-server
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: com.github.vitorpereiraa.sombra.agent.streaming.dto

sombra:
  agent:
    enabled: false
  server:
    topic-name: ${SOMBRA_TOPIC_NAME}
    candidate-url: ${SOMBRA_CANDIDATE_URL}
  reporting:
    metrics:
      enabled: ${SOMBRA_METRICS_ENABLED:false}
      otlp-endpoint: ${SOMBRA_OTLP_ENDPOINT:}
      step: 10s
      resource-attributes:
        service.name: sombra-server
    logging:
      enabled: true
      max-value-length: 512

server:
  port: 9090

management:
  server:
    port: 9091
  endpoints:
    web:
      exposure:
        include: health,info
