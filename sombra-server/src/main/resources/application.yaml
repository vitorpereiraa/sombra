spring:
  application:
    name: sombra
  threads:
    virtual:
      enabled: true
  main:
    banner-mode: off
  docker:
    compose:
      enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      auto-offset-reset: earliest
      group-id: sombra-server
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: com.github.vitorpereiraa.sombra.agent.streaming.dto

sombra:
  agent:
    enabled: false
  server:
    topic-name: ${SOMBRA_TOPIC_NAME}

server:
  port: 8080

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info
